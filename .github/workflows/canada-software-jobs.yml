name: Canada Software Jobs Monitor

on:
  workflow_dispatch:
    inputs:
      send_initial_snapshot:
        description: "Send current matching jobs on first run"
        required: false
        default: "false"
  schedule:
    - cron: "13 * * * *"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/canada-software-jobs.yml"
      - "job-monitor/**"

concurrency:
  group: canada-software-jobs-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r job-monitor/requirements.txt

      - name: Run monitor once
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.send_initial_snapshot || 'false' }}" = "true" ]; then
            EXTRA="--send-initial-snapshot"
          fi
          python job-monitor/job_monitor.py --config job-monitor/companies.json --state job-monitor/.job_monitor_state.json --once ${EXTRA}
